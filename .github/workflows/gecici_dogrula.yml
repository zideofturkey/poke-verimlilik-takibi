name: Gecici Dogrula
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  dogrula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests gspread google-auth python-dotenv
      - name: Ollama model önbelleğini yükle (varsa)
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-v3
      - name: Service account dosyasını oluştur
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: echo "$SERVICE_ACCOUNT_JSON" > service_account.json
      - env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python temp_dogrula.py
      - if: always()
        run: rm -f service_account.json
      - name: Sonucu commit'le
        run: |
          git config user.name "poke-bot"
          git config user.email "poke-bot@users.noreply.github.com"
          git add dogrulama_sonucu.txt
          git commit -m "chore: dogrulama sonucu" || echo "yok"
          git push
