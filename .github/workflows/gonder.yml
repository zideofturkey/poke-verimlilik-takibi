name: Gönder - Proaktif Mesajlar

on:
  schedule:
    # Saatler UTC - Türkiye (UTC+3) için:
    - cron: "0 6 * * *"   # Her gün 09:00 TR - sabah check-in
    - cron: "0 18 * * *"  # Her gün 21:00 TR - akşam kontrol
    - cron: "0 17 * * 3"  # Çarşamba 20:00 TR - hafta ortası kontrol
    - cron: "0 7 * * 0"   # Pazar 10:00 TR - haftalık hedef sorusu
  workflow_dispatch:       # Manuel tetikleme (test için)
    inputs:
      gorev:
        description: "Hangi görev gönderilsin?"
        required: true
        type: choice
        options:
          - sabah
          - aksam
          - hafta_ortasi
          - pazar

jobs:
  gonder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bağımlılıkları kur
        run: pip install requests gspread google-auth python-dotenv

      - name: Service account dosyasını oluştur
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: echo "$SERVICE_ACCOUNT_JSON" > service_account.json

      - name: Görevi belirle ve gönder
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            GOREV="${{ inputs.gorev }}"
          elif [ "${{ github.event.schedule }}" = "0 6 * * *" ]; then
            GOREV="sabah"
          elif [ "${{ github.event.schedule }}" = "0 18 * * *" ]; then
            GOREV="aksam"
          elif [ "${{ github.event.schedule }}" = "0 17 * * 3" ]; then
            GOREV="hafta_ortasi"
          elif [ "${{ github.event.schedule }}" = "0 7 * * 0" ]; then
            GOREV="pazar"
          fi
          python gonder.py "$GOREV"

      - name: service_account.json'ı sil (güvenlik)
        if: always()
        run: rm -f service_account.json
