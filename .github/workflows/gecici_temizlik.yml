name: GECICI - Temizlik (silinecek)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  temizlik:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bağımlılıkları kur
        run: pip install requests gspread google-auth python-dotenv

      - name: Service account dosyasını oluştur
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: echo "$SERVICE_ACCOUNT_JSON" > service_account.json

      - name: Temizlik scriptini çalıştır ve çıktıyı kaydet
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python temp_temizlik.py > temizlik_ciktisi.txt 2>&1 || true

      - name: service_account.json'ı sil (güvenlik)
        if: always()
        run: rm -f service_account.json

      - name: Çıktıyı commit et
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add temizlik_ciktisi.txt
          git commit -m "chore: temizlik çıktısı [skip ci]" || echo "değişiklik yok"
          git push
