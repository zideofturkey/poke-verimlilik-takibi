name: Webhook - Anlık Buton İşleme

on:
  repository_dispatch:
    types: [telegram_update]

permissions:
  contents: write

jobs:
  handle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bağımlılıkları kur
        run: pip install requests gspread google-auth python-dotenv

      - name: Service account dosyasını oluştur
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: echo "$SERVICE_ACCOUNT_JSON" > service_account.json

      # Ollama'nın kendisi artık Python içinde (common.py) ihtiyaç anında
      # kuruluyor - burada sadece model önbelleğini hazır tutuyoruz
      # (varsa hızlı restore, yoksa maliyeti Python tarafı üstleniyor).
      - name: Ollama model önbelleğini yükle (varsa) - sadece model dosyaları
        uses: actions/cache@v4
        with:
          path: ~/.ollama/models
          key: ollama-models-v3

      - name: Callback'i işle
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: python handle_update.py

      - name: service_account.json'ı sil (güvenlik)
        if: always()
        run: rm -f service_account.json

      - name: Hata logu varsa commit'le
        if: always()
        run: |
          git config user.name "poke-bot"
          git config user.email "poke-bot@users.noreply.github.com"
          if [ -f son_hata.txt ]; then
            # ÖNEMLİ: 'git reset --hard', takip edilen bir dosya olan
            # son_hata.txt'yi Python'un AZ ÖNCE yazdığı taze traceback'ten
            # origin/main'deki ESKİ haline geri döndürüyordu - yani bu adım
            # aylardır hiçbir gerçek hatayı commit'leyememişti (kendi mantık
            # hatası yüzünden). Şimdi reset'ten ÖNCE içeriği yedekleyip,
            # reset'ten SONRA geri yazıyoruz (last_update_id.txt adımındaki
            # doğru fetch→reset→YAZ→commit sırasıyla aynı desen).
            cp son_hata.txt /tmp/son_hata_yedek.txt
            for i in 1 2 3; do
              git fetch origin main -q
              git reset --hard origin/main -q
              cp /tmp/son_hata_yedek.txt son_hata.txt
              git add son_hata.txt
              git commit -m "chore: hata logu [skip ci]" -q || break
              if git push -q; then
                echo "Hata logu kaydedildi."
                break
              fi
              sleep 2
            done
          fi

      - name: Offset dosyasını commit'le (değiştiyse)
        run: |
          git config user.name "poke-bot"
          git config user.email "poke-bot@users.noreply.github.com"
          LOKAL_DEGER=$(cat last_update_id.txt 2>/dev/null || echo "")

          if [ -z "$LOKAL_DEGER" ]; then
            echo "Yerel değer yok, commit atlanıyor."
          else
            for i in 1 2 3 4 5; do
              git fetch origin main -q
              UZAK_DEGER=$(git show origin/main:last_update_id.txt 2>/dev/null || echo "0")
              # İkisinden büyük olanı al - rebase/merge çakışmasına hiç girmeden
              if [ "$LOKAL_DEGER" -gt "$UZAK_DEGER" ] 2>/dev/null; then
                SONUC=$LOKAL_DEGER
              else
                SONUC=$UZAK_DEGER
              fi

              git reset --hard origin/main -q
              echo "$SONUC" > last_update_id.txt

              if git diff --quiet last_update_id.txt; then
                echo "Değişiklik yok (uzak zaten güncel)."
                break
              fi

              git add last_update_id.txt
              git commit -m "chore: webhook offset güncelle [skip ci]" -q
              if git push -q; then
                echo "Offset güncellendi: $SONUC"
                break
              fi
              echo "Push reddedildi, tekrar deneniyor ($i/5)..."
              sleep 2
            done
          fi
