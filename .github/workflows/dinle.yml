name: Dinle - Buton Kontrolü

on:
  schedule:
    - cron: "0 * * * *"  # Saatte bir - artık sadece webhook başarısız olursa yedek
  workflow_dispatch:        # Manuel tetikleme (test için)

permissions:
  contents: write  # last_update_id.txt'yi geri commit'leyebilmek için

jobs:
  dinle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bağımlılıkları kur
        run: pip install requests gspread google-auth python-dotenv

      - name: Service account dosyasını oluştur
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: echo "$SERVICE_ACCOUNT_JSON" > service_account.json

      - name: Ollama kurulumunu ve model önbelleğini yükle (varsa)
        uses: actions/cache@v4
        with:
          path: |
            ~/.ollama/models
            /usr/local/bin/ollama
            /usr/local/lib/ollama
          key: ollama-cache-v2

      - name: Yeni buton basımlarını kontrol et
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python dinle.py

      - name: service_account.json'ı sil (güvenlik)
        if: always()
        run: rm -f service_account.json

      - name: Offset dosyasını commit'le (değiştiyse)
        run: |
          git config user.name "poke-bot"
          git config user.email "poke-bot@users.noreply.github.com"
          LOKAL_DEGER=$(cat last_update_id.txt 2>/dev/null || echo "")

          if [ -z "$LOKAL_DEGER" ]; then
            echo "Yerel değer yok, commit atlanıyor."
          else
            for i in 1 2 3 4 5; do
              git fetch origin main -q
              UZAK_DEGER=$(git show origin/main:last_update_id.txt 2>/dev/null || echo "0")
              if [ "$LOKAL_DEGER" -gt "$UZAK_DEGER" ] 2>/dev/null; then
                SONUC=$LOKAL_DEGER
              else
                SONUC=$UZAK_DEGER
              fi

              git reset --hard origin/main -q
              echo "$SONUC" > last_update_id.txt

              if git diff --quiet last_update_id.txt; then
                echo "Değişiklik yok (uzak zaten güncel)."
                break
              fi

              git add last_update_id.txt
              git commit -m "chore: offset güncelle [skip ci]" -q
              if git push -q; then
                echo "Offset güncellendi: $SONUC"
                break
              fi
              echo "Push reddedildi, tekrar deneniyor ($i/5)..."
              sleep 2
            done
          fi
